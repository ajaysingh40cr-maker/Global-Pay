<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1f2937;
padding:25px;
border-radius:15px;
width:320px;
text-align:center;
color:#fff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#f59e0b;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#msg{
margin-top:15px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="box">
<h2>Change Password</h2>

<input type="password" id="newpass" placeholder="New Password">
<input type="password" id="confirmpass" placeholder="Confirm Password">

<button onclick="changePassword()">Update Password</button>

<p id="msg"></p>
</div>

<script>
function changePassword(){

let pass=document.getElementById("newpass").value.trim();
let confirm=document.getElementById("confirmpass").value.trim();

if(pass===""||confirm===""){
document.getElementById("msg").innerHTML="Fill all fields";
document.getElementById("msg").style.color="red";
return;
}

if(pass!==confirm){
document.getElementById("msg").innerHTML="Passwords do not match";
document.getElementById("msg").style.color="red";
return;
}

localStorage.setItem("userPassword",pass);

document.getElementById("msg").innerHTML="✅ Password Changed Successfully";
document.getElementById("msg").style.color="lime";

setTimeout(()=>{
window.location.href="profile.html";
},1000);

}
</script>

</body>
  </html>
