<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Link</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:360px;
background:#132544;
padding:20px;
border-radius:15px;
text-align:center;
}

h2{
color:#fff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:14px;
border:none;
border-radius:8px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
}

.copy{
background:#16a34a;
color:#fff;
}

.back{
background:#ff9800;
color:#fff;
}
</style>
</head>

<body>

<div class="box">

<h2>Share Link</h2>

<input
id="link"
type="text"
readonly
value="https://globalpaypanel.github.io/Global-Pay/">

<button class="copy" onclick="copyLink()">📋 Copy Link</button>

<button class="back" onclick="history.back()">⬅ Back</button>

</div>

<script>
function copyLink(){
const copyText=document.getElementById("link");
copyText.select();
copyText.setSelectionRange(0,99999);
navigator.clipboard.writeText(copyText.value);
Swal.fire({
  title: "Link Copied",
  html: `
    <div style="text-align:center">
      <img src="https://media.tenor.com/On7kvXhzml4AAAAj/check.gif" width="90">
      <p style="font-size:18px;margin-top:12px;">
        Share link copied successfully!
      </p>
    </div>
  `,
  background: "#111827",
  color: "#ffffff",
  showConfirmButton: false,
  timer: 2200,
  width: "340px"
});
}
</script>

</body>
</html>
